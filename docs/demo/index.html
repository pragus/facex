<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceX Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; text-align: center; padding: 16px; }
h1 { font-size: 22px; margin-bottom: 4px; }
h1 span { color: #10b981; }
.sub { color: #666; font-size: 13px; margin-bottom: 16px; }
#log { color: #f59e0b; font-size: 13px; margin-bottom: 12px; min-height: 20px; }
#log.ok { color: #10b981; }
#log.err { color: #ef4444; }
video { width: 100%; max-width: 400px; border-radius: 10px; background: #111; display: block; margin: 0 auto 12px; }
.btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
button { padding: 10px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
button:disabled { opacity: 0.3; cursor: default; }
.green { background: #10b981; color: #fff; }
.gray { background: #333; color: #ccc; }
.red { background: #ef4444; color: #fff; }
#result { font-size: 18px; font-weight: 700; padding: 12px; border-radius: 8px; margin-bottom: 12px; }
#result.match { background: #052e16; color: #10b981; }
#result.nomatch { background: #1c0a0a; color: #ef4444; }
#result.idle { background: #111; color: #555; }
.stats { display: flex; gap: 12px; justify-content: center; font-size: 13px; color: #888; }
canvas { display: none; }
</style>
</head>
<body>

<h1>Face<span>X</span> Demo</h1>
<p class="sub">Face embedding in the browser. 44 KB WASM.</p>
<div id="log">Loading...</div>

<video id="vid" autoplay playsinline muted></video>

<div class="btns">
  <button id="bCam" class="green" disabled>Start Camera</button>
  <button id="bRef" class="gray" disabled>Capture Reference</button>
  <button id="bGo" class="green" disabled style="display:none">Start Verify</button>
  <button id="bStop" class="red" style="display:none">Stop</button>
</div>

<div id="result" class="idle"></div>
<div class="stats" id="stats" style="display:none">
  <span id="sEmb">—</span>
  <span id="sSim">—</span>
  <span id="sFps">—</span>
</div>

<canvas id="crop" width="112" height="112"></canvas>

<script src="facex.js"></script>
<script>
const vid = document.getElementById('vid');
const crop = document.getElementById('crop');
const cropCtx = crop.getContext('2d', {willReadFrequently: true});
const log = document.getElementById('log');
const result = document.getElementById('result');

let FxMod, fxH, refEmb = null, running = false;

function setLog(msg, cls) { log.textContent = msg; log.className = cls || ''; }

// ===== Load embedding engine only (no detector — simple center crop) =====
async function init() {
  try {
    setLog('Loading FaceX engine (44 KB)...');
    FxMod = await FaceXModule();

    setLog('Downloading model (7 MB, cached after first load)...');
    const data = await loadCached('edgeface_xs_fp32.bin', 'facex_emb_v1');
    FxMod.FS.writeFile('/w.bin', data);

    setLog('Initializing...');
    fxH = FxMod.cwrap('facex_init', 'number', ['string', 'string'])('/w.bin', null);
    if (!fxH) throw new Error('Init failed');

    setLog('Ready', 'ok');
    document.getElementById('bCam').disabled = false;
  } catch(e) {
    setLog('Error: ' + e.message, 'err');
  }
}

// ===== IndexedDB cache =====
async function loadCached(url, key) {
  try {
    const db = await new Promise((r, j) => {
      const q = indexedDB.open('facex', 1);
      q.onupgradeneeded = () => q.result.createObjectStore('w');
      q.onsuccess = () => r(q.result);
      q.onerror = () => j(q.error);
    });
    const cached = await new Promise(r => {
      const tx = db.transaction('w', 'readonly');
      const req = tx.objectStore('w').get(key);
      req.onsuccess = () => r(req.result);
      req.onerror = () => r(null);
    });
    if (cached) { setLog('Loaded from cache', 'ok'); return new Uint8Array(cached); }
    const buf = await fetch(url).then(r => r.arrayBuffer());
    try { db.transaction('w','readwrite').objectStore('w').put(buf, key); } catch(e) {}
    return new Uint8Array(buf);
  } catch(e) {
    return new Uint8Array(await fetch(url).then(r => r.arrayBuffer()));
  }
}

// ===== Camera =====
document.getElementById('bCam').onclick = async () => {
  try {
    document.getElementById('bCam').textContent = 'Starting...';
    document.getElementById('bCam').disabled = true;
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: {ideal: 320}, height: {ideal: 240} }
    });
    vid.srcObject = stream;
    await vid.play();
    // Wait up to 2s for valid dimensions
    for (let i = 0; i < 40; i++) {
      if (vid.videoWidth > 0) break;
      await new Promise(r => setTimeout(r, 50));
    }
    document.getElementById('bCam').style.display = 'none';
    document.getElementById('bRef').disabled = false;
    result.textContent = 'Camera ready. Look at camera and click "Capture Reference".';
    result.className = 'idle';
  } catch(e) {
    setLog('Camera error: ' + e.message, 'err');
    document.getElementById('bCam').disabled = false;
    document.getElementById('bCam').textContent = 'Start Camera';
  }
};

// ===== Crop face from center of video =====
function cropFace() {
  const W = vid.videoWidth, H = vid.videoHeight;
  if (!W || !H) return null;
  // Take center square, 60% of shorter dimension
  const sz = Math.min(W, H) * 0.6;
  const sx = (W - sz) / 2, sy = (H - sz) / 2;
  cropCtx.drawImage(vid, sx, sy, sz, sz, 0, 0, 112, 112);
  return cropCtx.getImageData(0, 0, 112, 112);
}

// ===== Compute embedding =====
function embed(imgData) {
  const N = 112 * 112 * 3;
  const inP = FxMod._malloc(N * 4);
  const outP = FxMod._malloc(512 * 4);
  const h = FxMod.HEAPF32;
  const b = inP >> 2;
  const px = imgData.data;
  for (let i = 0; i < 112*112; i++) {
    h[b+i*3]   = px[i*4]   / 127.5 - 1;
    h[b+i*3+1] = px[i*4+1] / 127.5 - 1;
    h[b+i*3+2] = px[i*4+2] / 127.5 - 1;
  }
  const t0 = performance.now();
  FxMod.cwrap('facex_embed','number',['number','number','number'])(fxH, inP, outP);
  const ms = performance.now() - t0;
  const emb = new Float32Array(512);
  emb.set(h.subarray(outP>>2, (outP>>2)+512));
  FxMod._free(inP);
  FxMod._free(outP);
  return { emb, ms };
}

function cosSim(a, b) {
  let d=0, na=0, nb=0;
  for (let i=0; i<512; i++) { d+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
  return d / Math.sqrt(na * nb);
}

// ===== Capture reference =====
document.getElementById('bRef').onclick = () => {
  const img = cropFace();
  if (!img) { result.textContent = 'Camera not ready'; return; }
  result.textContent = 'Computing embedding...';
  setTimeout(() => {
    const { emb, ms } = embed(img);
    refEmb = emb;
    result.textContent = 'Reference captured (' + ms.toFixed(0) + 'ms). Click "Start Verify".';
    result.className = 'idle';
    document.getElementById('bGo').style.display = 'inline-block';
    document.getElementById('bGo').disabled = false;
  }, 30);
};

// ===== Verify loop =====
document.getElementById('bGo').onclick = () => {
  running = true;
  document.getElementById('bGo').style.display = 'none';
  document.getElementById('bStop').style.display = 'inline-block';
  document.getElementById('bRef').disabled = true;
  document.getElementById('stats').style.display = 'flex';
  loop();
};
document.getElementById('bStop').onclick = () => {
  running = false;
  document.getElementById('bStop').style.display = 'none';
  document.getElementById('bGo').style.display = 'inline-block';
  document.getElementById('bGo').disabled = false;
  document.getElementById('bRef').disabled = false;
};

function loop() {
  if (!running) return;
  const img = cropFace();
  if (!img) { requestAnimationFrame(loop); return; }
  const t0 = performance.now();
  const { emb, ms } = embed(img);
  const sim = cosSim(refEmb, emb);
  const total = performance.now() - t0;
  const match = sim > 0.3;

  result.textContent = match
    ? 'MATCH — ' + (sim*100).toFixed(1) + '%'
    : 'NO MATCH — ' + (sim*100).toFixed(1) + '%';
  result.className = match ? 'match' : 'nomatch';

  document.getElementById('sEmb').textContent = 'Embed: ' + ms.toFixed(0) + 'ms';
  document.getElementById('sSim').textContent = 'Sim: ' + (sim*100).toFixed(1) + '%';
  document.getElementById('sFps').textContent = 'FPS: ' + (1000/total).toFixed(0);

  requestAnimationFrame(loop);
}

init();
</script>
</body>
</html>
